specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Deluxe Corporation
providerId: deluxe
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Deluxe does not publish a public rate-limit table. Operational limits are set per merchant integration
  or SaaS subscription and exposed via partner / merchant onboarding documentation behind login. Headers
  and response codes below are scaffold defaults pending direct doc reconciliation.
tags:
  - Payments
  - Payroll
  - Merchant Services
  - Rate Limiting
description: Per-merchant and per-subscription rate limits set during onboarding rather than self-serve.
  Standard 4xx / 5xx semantics for throttle and quota signaling are assumed.
sources:
  - https://developer.deluxe.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: merchant
    name: Merchant-Negotiated Limit
    scope: contract
    metric: varies
    limit: 'set per merchant / subscription onboarding'
    applies:
      - Deluxe Corporation API
policies:
  - name: Per-Merchant Onboarding
    description: TPS and daily quotas are configured during merchant or SaaS onboarding; defaults are
      not published publicly.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring Retry-After when present.
  - name: PCI Considerations
    description: Payment APIs require PCI-compliant integration (e.g. tokenization / hosted fields); rate
      limits are aligned to the gateway's capacity and merchant risk profile.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
