specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Deluxe Corporation
providerId: deluxe
publisherName: Deluxe Corporation
serviceCategory: Payments / Treasury / Business Services
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Deluxe is a multi-product business-services provider (payments, payroll/HR, treasury, marketing/data,
  check services). FinOps shape is mixed take-rate (payments), per-item (check / lockbox / ACH), and SaaS
  subscription (payroll, HR, promo). Reconcile per merchant agreement when available.
tags:
  - Payments
  - Payroll
  - Merchant Services
  - Treasury
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Deluxe Corporation services: take-rate plus per-item plus subscription
  blend across payments, treasury, payroll/HR, and marketing/data product lines. No public per-call API
  fees; cost is driven by underlying merchant or SaaS contract.'
sources:
  - https://www.deluxe.com/payments/
  - https://developer.deluxe.com/
principles:
  - name: Visibility
    description: Track Deluxe Payment Exchange transaction volume via merchant statements; reconcile per-item
      counts (check / lockbox / ACH) against monthly invoices; track SaaS seat counts in payroll / HR
      portals.
  - name: Allocation
    description: Allocate take-rate fees by merchant and product line; allocate per-item fees by department
      processing the items; allocate SaaS seats by HR cost-center mapping.
  - name: Optimization
    description: Tune interchange optimization (Level 2 / Level 3 data) on B2B card transactions, batch
      ACH origination to minimize per-file fees, prune unused payroll seats, and consolidate check / lockbox
      volumes.
  - name: Accountability
    description: Treasury owns merchant statements; HR owns payroll subscription costs; marketing owns
      promotional / data subscriptions. Route invoice anomalies through Deluxe account team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Take Rate + Per-Item + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Deluxe Corporation API
  ServiceCategory: Payments / Treasury / Business Services
  ProviderName: Deluxe Corporation
  PublisherName: Deluxe Corporation
  InvoiceIssuerName: Deluxe Corporation
  PricingCategory: Mixed (Take Rate + Per-Item + Subscription)
  PricingUnit: varies
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: card_transactions
    description: Card payment transactions processed via Deluxe Payment Exchange
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant
      - card_brand
      - present
  - name: ach_originations
    description: ACH origination transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant
      - sec_code
  - name: check_items
    description: Printed checks, lockbox items, or remittance items processed
    unit: item
    aggregation: sum
    dimensions:
      - merchant
      - product
  - name: payroll_seats
    description: Payroll / HR module seats
    unit: seat
    aggregation: max
    dimensions:
      - subscription
  - name: subscription_fee
    description: Monthly subscription fees for SaaS modules
    unit: month
    aggregation: sum
    dimensions:
      - subscription
      - product
apis:
  - name: Deluxe Corporation API
    baseURL: https://api.deluxe.com
    tags:
      - Payments
      - Payroll
      - Treasury
      - Marketing
    serviceName: Deluxe Corporation API
    serviceCategory: API
unitEconomics:
  - name: Effective Take Rate
    metric: payments_revenue / payments_volume
    target: TBD
  - name: Cost per Item Processed
    metric: per_item_cost / items_processed
    target: TBD
  - name: Cost per Payroll Seat
    metric: payroll_subscription_cost / payroll_seats
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
