specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Deluxe Corporation
providerId: deluxe
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Deluxe does not publish self-serve API pricing. Their merchant payment, payroll/HR, treasury management,
  promotional, and data analytics services are sold as merchant accounts, SaaS subscriptions, and statement-of-work
  engagements with custom rate cards (interchange-plus or interchange-bundled merchant pricing for payments).
  No public per-call API price exists.
tags:
  - Payments
  - Payroll
  - Treasury Management
  - Merchant Services
  - Data Analytics
description: Deluxe APIs are gated behind a merchant or SaaS contract rather than a self-serve developer
  plan. Payments use merchant-services rate cards (typically interchange-plus or tiered-bundled) negotiated
  per merchant; payroll, HR, and promotional / data services are sold as subscriptions; treasury and check
  services price per item or per file. This artifact retains a single contract-bundled plan stub pending
  direct merchant-agreement reconciliation.
sources:
  - https://www.deluxe.com/payments/
  - https://developer.deluxe.com/
plans:
  - id: deluxe-merchant-contract
    name: Merchant / SaaS Contract
    type: enterprise
    description: API access is granted under a Deluxe merchant agreement (payments) or SaaS subscription
      (payroll, HR, marketing, treasury). Pricing is bilateral and not published publicly.
    entries:
      - label: Merchant Payment Processing
        description: Per-transaction percentage and fixed fee under merchant agreement (interchange-plus
          or tiered-bundled).
        name: payment_processing
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://api.deluxe.com
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: SaaS Subscription
        description: Monthly subscription for payroll, HR, treasury, or marketing modules.
        name: saas_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: US
        domains:
          - https://api.deluxe.com
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per-Item / Per-File Fees
        description: Check printing, lockbox, ACH origination, and remittance services priced per item or per file.
        name: per_item_fees
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://api.deluxe.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Deluxe Payment Exchange APIs
      - name: Deluxe Payroll / HR APIs
      - name: Deluxe Treasury Management APIs
      - name: Promotional / Marketing Data APIs
      - name: Deluxe Corporation API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
